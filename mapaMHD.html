<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOKOTICE MOBILE MAPS</title>
    <style>
        :root {
            --primary: #ffdd00;
            --bg: #111;
            --panel: #222;
            --text: #eee;
            --line1: #ff3e3e; /* Červená */
            --line2: #3e8eff; /* Modrá */
            --line3: #ffcc00; /* Žlutá */
            --line333: #2ecc71; /* Zelená */
            --train: #95a5a6; /* Šedá */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: sans-serif; background: var(--bg); color: var(--text);
            overflow: hidden; touch-action: none;
        }

        /* --- HLAVNÍ KONTEJNER --- */
        #map-viewport {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            cursor: grab;
        }

        #map-content {
            position: absolute;
            width: 5000px; height: 5000px;
            background-color: #1a1a1a;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100px 100px;
            transform-origin: 0 0;
        }

        /* --- TRASY (SVG) --- */
        svg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .route {
            fill: none; stroke-width: 12; 
            stroke-linecap: round; stroke-linejoin: round;
        }
        .train { stroke-dasharray: 20, 15; stroke-width: 10; }

        /* --- ZASTÁVKY --- */
        .stop {
            position: absolute; width: 24px; height: 24px;
            background: white; border: 5px solid #000;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: auto;
        }
        .stop.hub { width: 35px; height: 35px; border-color: var(--primary); }
        
        .label {
            position: absolute; font-size: 14px; font-weight: bold;
            color: white; text-shadow: 2px 2px 4px #000;
            white-space: nowrap; transform: translate(-50%, 20px);
            pointer-events: none; z-index: 11;
        }

        /* --- MOBILNÍ GUI --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .header {
            pointer-events: auto; background: rgba(0,0,0,0.8);
            padding: 15px; border-bottom: 2px solid var(--primary);
            text-align: center;
        }

        #info-card {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: var(--panel); border-radius: 20px 20px 0 0;
            padding: 20px; box-sizing: border-box;
            transition: bottom 0.4s ease; pointer-events: auto;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        #info-card.active { bottom: 0; }

        .btn-close { float: right; padding: 10px; color: var(--primary); font-weight: bold; }

        .controls {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px;
        }
        .btn {
            pointer-events: auto; width: 50px; height: 50px;
            background: var(--panel); border: 1px solid #444;
            color: white; border-radius: 10px; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
        }

        .village-label {
            position: absolute; font-size: 60px; color: rgba(255,255,255,0.05);
            font-weight: 900; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="header">
        <strong>KOKOTICE MAPS v3.0</strong>
    </div>

    <div class="controls">
        <div class="btn" onclick="zoom(1.2)">+</div>
        <div class="btn" onclick="zoom(0.8)">−</div>
        <div class="btn" onclick="recenter()">⌂</div>
    </div>

    <div id="info-card">
        <div class="btn-close" onclick="closeInfo()">ZAVŘÍT</div>
        <h2 id="st-name">Název zastávky</h2>
        <p id="st-lines"></p>
        <p id="st-desc" style="color: #bbb;"></p>
        <div id="st-departures" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;">
            <small>Příští spoj: <strong>Za 3 minuty</strong></small>
        </div>
    </div>
</div>

<div id="map-viewport">
    <div id="map-content">
        <div class="village-label" style="top: 2200px; left: 1800px;">SMRADLAVÝ ÚJEZDEC</div>
        <div class="village-label" style="top: 2500px; left: 2400px;">CENTRUM</div>
        <div class="village-label" style="top: 2800px; left: 3200px;">KOKOTSKÝ ÚJEZDEC</div>

        <svg>
            <path id="p-train" class="route train" stroke="var(--train)"></path>
            <path id="p-1" class="route" stroke="var(--line1)"></path>
            <path id="p-2" class="route" stroke="var(--line2)"></path>
            <path id="p-3" class="route" stroke="var(--line3)"></path>
            <path id="p-333" class="route" stroke="var(--line333)"></path>
        </svg>

        <div id="stops-container"></div>
    </div>
</div>

<script>
    const CONFIG = {
        stops: [
            // CENTRUM A LINKA 1
            { id: 'vzn', n: 'VOZOVNA', x: 2000, y: 2500, l: ['1'], d: 'Tady se budí autobusy. Smrdí to tu naftou.' },
            { id: 'skl', n: 'ŠKOLA', x: 2200, y: 2500, l: ['1'], d: 'Děti tu pláčou, revizoři se smějí.' },
            { id: 'kfl', n: 'KAUFLAND', x: 2400, y: 2500, l: ['1', '333'], d: 'Bitva o zlevněné máslo začíná v 7:00.' },
            { id: 'nam', n: 'NÁMĚSTÍ OSVOBOZENÍ', x: 2700, y: 2500, l: ['1', '2', '3'], hub: true, d: 'Srdce Kokotic. Tady se kříží 1 a 2.' },
            { id: 'nad', n: 'NÁDRAŽÍ ČD', x: 3000, y: 2500, l: ['1', '2', 'TRAIN', '333'], hub: true, d: 'Přestup na vlaky směr Prdelákovice.' },
            { id: 'pru', n: 'PRŮMYSLOVÁ ZÓNA', x: 3300, y: 2500, l: ['1'], d: 'Tady lidi mění čas za peníze.' },
            
            // LINKA 2 (Modrá)
            { id: 'zam', n: 'ZÁMECKÝ PARK', x: 2700, y: 2200, l: ['2'], d: 'Pozor na labutě, jsou agresivní.' },
            { id: 'nak', n: 'NÁKUPNÍ CENTRUM JIH', x: 2700, y: 2800, l: ['2', '333'], d: 'Utrácejte, dokud máte.' },

            // LINKA 3 (Žlutá)
            { id: 'sid', n: 'SÍDLIŠTĚ MARNOST', x: 2500, y: 2300, l: ['1','3'], d: 'Tady se kříží 1 a 3. Šedé domy, šedé sny.' },
            { id: 'uni', n: 'UNIVERZITA', x: 3000, y: 2800, l: ['3'], d: 'Vědomosti jsou síla, ale pivo je pivo.' },

            // REGION A VLAKY
            { id: 'uje_s', n: 'SMRADLAVÝ ÚJEZDEC', x: 1500, y: 2500, l: ['333'], d: 'Název mluví za vše.' },
            { id: 'uje_k', n: 'KOKOTSKÝ ÚJEZDEC', x: 3500, y: 3500, l: ['333'], d: 'Daleký venkov.' },
            { id: 'prd', n: 'PRDELÁKOVICE', x: 4500, y: 4500, l: ['TRAIN'], d: 'Tady lišky dávají dobrou noc.' }
        ],
        routes: [
            { id: '1', s: ['vzn','skl','sid','kfl','nam','nad','pru'] },
            { id: '2', s: ['zam','nam','nad','nak'] },
            { id: '3', s: ['sid','nam','uni'] },
            { id: '333', s: ['uje_s','kfl','nam','nad','nak','uje_k'] },
            { id: 'train', s: ['vzn','nam','nad','prd'] }
        ]
    };

    let scale = 0.6;
    let posX = window.innerWidth/2 - 2700*scale;
    let posY = window.innerHeight/2 - 2500*scale;
    const content = document.getElementById('map-content');

    function init() {
        const container = document.getElementById('stops-container');
        CONFIG.stops.forEach(s => {
            const div = document.createElement('div');
            div.className = 'stop' + (s.hub ? ' hub' : '');
            div.style.left = s.x + 'px'; div.style.top = s.y + 'px';
            div.onclick = () => showInfo(s);
            
            const lbl = document.createElement('div');
            lbl.className = 'label';
            lbl.innerText = s.n;
            lbl.style.left = s.x + 'px'; lbl.style.top = s.y + 'px';
            
            container.appendChild(div);
            container.appendChild(lbl);
        });

        CONFIG.routes.forEach(r => {
            const path = document.getElementById('p-' + r.id);
            let d = "";
            r.s.forEach((sid, i) => {
                const stop = CONFIG.stops.find(x => x.id === sid);
                d += (i===0?'M':'L') + stop.x + ' ' + stop.y;
            });
            path.setAttribute('d', d);
        });
        update();
    }

    // --- OVLÁDÁNÍ ---
    let isDragging = false;
    let lastX, lastY;

    // Podpora pro Myš i Dotyk
    const start = e => {
        isDragging = true;
        lastX = e.touches ? e.touches[0].clientX : e.clientX;
        lastY = e.touches ? e.touches[0].clientY : e.clientY;
    };
    const move = e => {
        if(!isDragging) return;
        const curX = e.touches ? e.touches[0].clientX : e.clientX;
        const curY = e.touches ? e.touches[0].clientY : e.clientY;
        posX += (curX - lastX);
        posY += (curY - lastY);
        lastX = curX; lastY = curY;
        update();
    };
    const stop = () => isDragging = false;

    window.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    window.addEventListener('touchstart', start);
    window.addEventListener('touchmove', move);
    window.addEventListener('touchend', stop);

    function update() {
        content.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function zoom(f) { scale *= f; update(); }
    function recenter() { 
        scale = 0.6; 
        posX = window.innerWidth/2 - 2700*scale; 
        posY = window.innerHeight/2 - 2500*scale; 
        update(); 
    }

    function showInfo(s) {
        document.getElementById('st-name').innerText = s.n;
        document.getElementById('st-lines').innerHTML = s.l.map(line => `<span style="background:var(--line${line}); padding:3px 8px; border-radius:5px; color:black; font-weight:bold; margin-right:5px;">${line}</span>`).join('');
        document.getElementById('st-desc').innerText = s.d;
        document.getElementById('info-card').classList.add('active');
    }
    function closeInfo() { document.getElementById('info-card').classList.remove('active'); }

    init();
</script>
</body>
</html>
