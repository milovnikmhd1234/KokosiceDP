<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminál Řidiče DP</title>
    <!-- Leaflet CSS pro mapu -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent: #f39c12;
            --text: #ffffff;
            --border: #444;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            height: 100%; overflow: hidden;
        }

        /* --- PŘIHLÁŠENÍ --- */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
        }

        .login-box {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #111;
            color: white;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        /* --- HLAVNÍ ROZHRANÍ --- */
        #main-interface { display: none; height: 100vh; grid-template-rows: 60px 1fr 80px; }

        header {
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
        }

        .content-area { display: grid; grid-template-columns: 1fr 350px; gap: 10px; padding: 10px; }

        #map { background: #333; border-radius: 8px; }

        .timetable-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .next-stop { color: var(--accent); font-weight: bold; }

        /* --- NAVIGACE --- */
        nav {
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item { color: #888; text-decoration: none; text-align: center; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h2>DP Terminál</h2>
            <input type="number" id="driverId" placeholder="Číslo řidiče">
            <input type="password" id="pin" placeholder="PIN">
            <button onclick="login()">PŘIHLÁSIT SE</button>
        </div>
    </div>

    <!-- Main Interface -->
    <div id="main-interface">
        <header>
            <div id="line-info">Linka: <b>124 / 4</b></div>
            <div id="clock">12:45:08</div>
            <div id="delay" style="color: #2ecc71;">Zpoždění: +0:15</div>
        </header>

        <div class="content-area">
            <div id="map"></div>
            <div class="timetable-panel">
                <h3>Jízdní řád</h3>
                <table>
                    <thead>
                        <tr><th>Zastávka</th><th>Příj.</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>Budějovická</td><td>12:40</td></tr>
                        <tr class="next-stop"><td>Brumlovka</td><td>12:46</td></tr>
                        <tr><td>Vyskočilova</td><td>12:48</td></tr>
                        <tr><td>Pankrác</td><td>12:52</td></tr>
                        <tr><td>Dvorce</td><td>12:58</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav>
            <div class="nav-item active">MAPA</div>
            <div class="nav-item">JŘ</div>
            <div class="nav-item">ZPRÁVY</div>
            <div class="nav-item" onclick="location.reload()">ODHLÁSIT</div>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function login() {
            const id = document.getElementById('driverId').value;
            const pin = document.getElementById('pin').value;

            if(id && pin) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-interface').style.display = 'grid';
                initMap();
            } else {
                alert('Zadejte prosím údaje.');
            }
        }

        function initMap() {
            // Inicializace mapy (střed Praha)
            const map = L.map('map').setView([50.08, 14.43], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Ukázka vozidla na mapě
            L.marker([50.08, 14.43]).addTo(map).bindPopup('Vaše poloha').openPopup();
        }

        // Hodiny v reálném čase
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('cs-CZ');
        }, 1000);
    </script>
</body>
</html>
