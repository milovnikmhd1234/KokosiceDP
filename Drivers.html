<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP Terminál v3.0 - Full Service</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #0b0e14; --surface: #1c212c; --accent: #f39c12;
            --text: #ecf0f1; --dim: #95a5a6; --blue: #3498db;
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* LOGIN */
        #login-page { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: var(--surface); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #34495e; }
        .btn-login { width: 100%; padding: 15px; background: var(--accent); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* APP */
        #app-container { display: none; height: 100vh; grid-template-rows: 70px 1fr 90px; }
        header { background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 3px solid var(--accent); }
        
        main { position: relative; overflow: hidden; }
        .view { display: none; height: 100%; width: 100%; padding: 20px; box-sizing: border-box; }
        .view.active { display: block; }
        
        .card { background: var(--surface); border-radius: 10px; padding: 20px; height: 95%; overflow-y: auto; }
        
        /* TABLES */
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: var(--surface); color: var(--accent); padding: 12px; text-align: left; border-bottom: 2px solid #444; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        .trip-header { background: #2c3e50; font-weight: bold; color: var(--accent); }

        /* ROUTES */
        .route-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .route-item { background: #2c3e50; padding: 15px; border-radius: 8px; cursor: pointer; border-left: 5px solid var(--accent); }
        .route-item:hover { background: #34495e; }
        .dir-label { font-size: 0.8rem; color: var(--dim); display: block; margin-bottom: 5px; }

        /* NAV */
        nav { background: #000; display: grid; grid-template-columns: repeat(4, 1fr); }
        .nav-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--accent); background: #111; }
        svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h1 style="color:var(--accent);">DP TERMINÁL v3</h1>
            <button class="btn-login" onclick="handleLogin()">PŘIHLÁSIT ŘIDIČE</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div id="header-line" style="font-size: 1.2rem;">Linka: <b>---</b></div>
            <div id="clock" style="font-size: 1.5rem; font-family: monospace;">00:00:00</div>
        </header>

        <main>
            <div id="view-map" class="view active"><div id="map" style="height:100%; border-radius:10px;"></div></div>

            <div id="view-timetable" class="view">
                <div class="card">
                    <h2 id="jr-title">Celodenní JŘ</h2>
                    <table>
                        <thead><tr><th>Zastávka</th><th>Příjezd</th><th>Směr</th></tr></thead>
                        <tbody id="jr-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-routes" class="view">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2>Vyberte linku a směr</h2>
                        <a href="celodenni_jizdni_rady.pdf" style="color:var(--blue); text-decoration:none; font-weight:bold;" download>💾 STÁHNOUT PDF</a>
                    </div>
                    <div class="route-grid" id="route-list"></div>
                </div>
            </div>
        </main>

        <nav>
            <button class="nav-btn active" onclick="showView('map', this)"><svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>MAPA</button>
            <button class="nav-btn" onclick="showView('timetable', this)"><svg viewBox="0 0 24 24"><path d="M19,19H5V8H19M17,12H12V17H17V12Z"/></svg>JŘ</button>
            <button class="nav-btn" onclick="showView('routes', this)"><svg viewBox="0 0 24 24"><path d="M4,15V9H12V4.16L19.84,12L12,19.84V15H4Z"/></svg>LINKY</button>
            <button class="nav-btn" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z"/></svg>LOGOUT</button>
        </nav>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const data = {
            1: { name: "Linka 1 (Trol)", stops: ["ZŠ", "Zemědělská zóna", "Nám. 1. Máje", "Nám. B. Moravské", "Depo Trolejbusů"], interval: 20 },
            2: { name: "Linka 2 (Bus)", stops: ["Depo Trolejbusu", "Nákupní středisko", "Hlavní nádraží", "Tesco", "Depo Autobusu", "ÚAN"], interval: 20 },
            12: { name: "Linka 12 (Bus)", stops: ["Depo autobusu", "ÚAN", "Hospoda", "Základní škola"], interval: 20 },
            13: { name: "Linka 13 (Expres)", stops: ["ÚAN", "Hlavní nádraží"], interval: 60 }
        };

        let map;

        function handleLogin() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            renderRouteButtons();
            initMap();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);
        }

        function renderRouteButtons() {
            const container = document.getElementById('route-list');
            Object.keys(data).forEach(id => {
                const route = data[id];
                // Tam
                container.innerHTML += `<div class="route-item" onclick="generateSchedule(${id}, 'tam')">
                    <span class="dir-label">SMĚR: ${route.stops[route.stops.length-1]}</span>
                    <strong>${route.name}</strong>
                </div>`;
                // Zpět
                container.innerHTML += `<div class="route-item" onclick="generateSchedule(${id}, 'zpet')">
                    <span class="dir-label">SMĚR: ${route.stops[0]}</span>
                    <strong>${route.name}</strong>
                </div>`;
            });
        }

        function generateSchedule(id, dir) {
            const route = data[id];
            const stops = dir === 'tam' ? route.stops : [...route.stops].reverse();
            const body = document.getElementById('jr-body');
            document.getElementById('header-line').innerHTML = `Linka: <b>${id}</b> (${dir.toUpperCase()})`;
            document.getElementById('jr-title').innerText = `Celodenní JŘ - Linka ${id}`;
            body.innerHTML = "";

            for (let hour = 4; hour <= 22; hour++) {
                for (let min = 0; min < 60; min += route.interval) {
                    if (hour === 22 && min > 0) break;

                    // Hlavička spoje
                    let hRow = document.createElement('tr');
                    hRow.className = "trip-header";
                    hRow.innerHTML = `<td colspan="3">Spoj v ${hour}:${min.toString().padStart(2,'0')}</td>`;
                    body.appendChild(hRow);

                    // Jednotlivé zastávky
                    stops.forEach((stop, i) => {
                        let sRow = document.createElement('tr');
                        let time = new Date(2026, 0, 1, hour, min + (i * 3)); // Každá zastávka +3 minuty
                        sRow.innerHTML = `<td>${stop}</td><td>${time.getHours()}:${time.getMinutes().toString().padStart(2,'0')}</td><td>${dir === 'tam' ? '>>>' : '<<<' }</td>`;
                        body.appendChild(sRow);
                    });
                }
            }
            showView('timetable', document.querySelectorAll('.nav-btn')[1]);
        }

        function showView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            btn.classList.add('active');
            if(viewId === 'map' && map) setTimeout(() => map.invalidateSize(), 100);
        }

        function initMap() {
            map = L.map('map').setView([50.08, 14.43], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }
    </script>
</body>
</html>
